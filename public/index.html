<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scyllora V9 | API Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --border: #f1f5f9; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text-main); }
        .header-banner { width: 100%; height: 200px; background: linear-gradient(135deg, var(--primary), #4cc9f0); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .main-container { max-width: 800px; margin: -40px auto 50px; padding: 0 20px; }
        .soft-card { background: var(--card-bg); border-radius: 24px; padding: 30px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .status-badge { display: inline-flex; align-items: center; padding: 6px 15px; background: #f0fdf4; color: var(--success); border-radius: 100px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; margin-right: 8px; }
        .category-title { font-size: 0.75rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin: 30px 0 10px; letter-spacing: 1.5px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .api-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--border); }
        .api-item:last-child { border-bottom: none; }
        .api-link { background: #f1f5ff; color: var(--primary); padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; text-decoration: none; cursor: pointer; transition: 0.2s; }
        .api-link:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="header-banner">
        <h1 style="font-size: 2.5rem; margin: 0; letter-spacing: -2px; font-weight: 800;">SCYLLORA V9</h1>
        <p style="opacity: 0.9; font-weight: 600;">Advanced API Engine Powered by KevCodex ✧</p>
    </div>
    <div class="main-container">
        <section class="soft-card">
            <div class="status-badge"><div class="status-dot"></div> <span id="system-status">System Initializing...</span></div>
            <h2 id="feature-count" style="margin: 0; font-size: 1.2rem;">Menghubungkan ke API...</h2>
        </section>
        <section class="soft-card" id="api-list-container">
            <p style="text-align: center; color: var(--text-sub);">Memuat daftar fitur...</p>
        </section>
    </div>
    <script>
        async function loadDocs() {
            const statusEl = document.getElementById('system-status');
            const countEl = document.getElementById('feature-count');
            const container = document.getElementById('api-list-container');
            try {
                const response = await fetch('/api');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const plugins = await response.json();
                if (Array.isArray(plugins)) {
                    statusEl.innerText = "System Online";
                    countEl.innerText = `${plugins.length} Fitur Aktif Terdeteksi`;
                    const categories = {};
                    plugins.forEach(p => {
                        const cat = p.category || "General";
                        if (!categories[cat]) categories[cat] = "";
                        categories[cat] += `
                            <div class="api-item">
                                <div><strong>${p.name || p.id}</strong><br><small style="color:var(--text-sub)">${p.description || 'No description'}</small></div>
                                <a class="api-link" onclick="window.open('/api?feature=${p.id}', '_blank')">Execute</a>
                            </div>`;
                    });
                    let html = "";
                    for (const name in categories) html += `<div class="category-title">${name}</div>${categories[name]}`;
                    container.innerHTML = html || "<p style='text-align:center'>Belum ada plugin terdeteksi.</p>";
                }
            } catch (e) {
                statusEl.innerText = "System Offline";
                countEl.innerText = "Gagal memuat data server.";
                container.innerHTML = `<p style="color:red; text-align:center;">Error: ${e.message}</p>`;
            }
        }
        window.onload = loadDocs;
    </script>
</body>
</html>
